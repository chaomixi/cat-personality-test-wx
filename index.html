  };
  var currentQ = 0, answers = [], canClick = true;
  var isWechat = /MicroMessenger/i.test(navigator.userAgent);
  var app = document.getElementById('app');
  var btnStart = document.getElementById('btn-start');
  var btnRetry = document.getElementById('btn-retry');
  var btnShare = document.getElementById('btn-share');
      var qProgressBar = document.getElementById('q-progress-bar');
  var qNumber = document.getElementById('q-number');
  var qText = document.getElementById('q-text');
  var qOptions = document.getElementById('q-options');
  var resultCard = document.getElementById('result-card');
  function createPaws() {
    var c = document.getElementById('pawPrints');
    for (var i = 0; i < 8; i++) {
      var p = document.createElement('div');
      p.className = 'paw';
      p.textContent = '🐾';
      p.style.left = (Math.random() * 90 + 5) + '%';
      p.style.animationDelay = (Math.random() * 8) + 's';
      p.style.animationDuration = (6 + Math.random() * 6) + 's';
      p.style.fontSize = (12 + Math.random() * 12) + 'px';
      c.appendChild(p);
    }
  }
  function showScreen(id) {
    var screens = document.querySelectorAll('.screen');
    for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
    var t = document.getElementById(id);
    if (t) t.classList.add('active');
  }
  function spawnHeart(x, y) {
    var h = document.createElement('div');
    h.className = 'float-heart';
    h.textContent = ['❤️','💕','💗','✨','🐾'][Math.floor(Math.random()*5)];
    h.style.left = x + 'px';
    h.style.top = y + 'px';
    app.appendChild(h);
    setTimeout(function(){ h.remove(); }, 3000);
  }
  var qNav = document.getElementById('q-nav');
  function renderQuestion() {
    var q = questions[currentQ];
    qProgressBar.style.width = (currentQ/questions.length*100)+'%';
    qNumber.textContent = '问题 ' + (currentQ+1) + ' / ' + questions.length;
    qText.textContent = q.text;
    qOptions.innerHTML = '';
    // 上一题按钮
    if(currentQ > 0){
      qNav.innerHTML = '<button class="btn-back" id="btn-prev">⬅ 上一题</button>';
      document.getElementById('btn-prev').addEventListener('click',function(){
        answers.pop();
        currentQ--;
        canClick = true;
        renderQuestion();
      });
    } else {
      qNav.innerHTML = '';
    }
    for (var i = 0; i < q.options.length; i++) {
      (function(idx){
        var opt = q.options[idx];
        var div = document.createElement('div');
        div.className = 'q-option';
        div.innerHTML = '<div class="q-option-icon '+opt.cls+'">'+opt.icon+'</div><div class="q-option-text">'+opt.text+'</div>';
        div.addEventListener('click', function(e){
          if (!canClick) return;
          canClick = false;
          var all = qOptions.querySelectorAll('.q-option');
          for (var j=0;j<all.length;j++) all[j].classList.remove('selected');
          div.classList.add('selected');
          var rect = div.getBoundingClientRect();
          spawnHeart(rect.left+rect.width/2, rect.top);
          qProgressBar.style.width = ((currentQ+1)/questions.length*100)+'%';
          answers.push(opt.type);
          setTimeout(function(){
            currentQ++;
            if (currentQ < questions.length) { renderQuestion(); canClick = true; }
            else { showResult(); }
          }, 400);
        });
        qOptions.appendChild(div);
      })(i);
    }
  }
  function getMajorType() {
    var counts = {lazy:0,cool:0,active:0,sweet:0,shy:0,proud:0,clingy:0,foodie:0,elegant:0,naughty:0,brave:0,dreamy:0};
    for (var i=0;i<answers.length;i++) { if(counts[answers[i]]!==undefined) counts[answers[i]]++; }
    var max='lazy', maxC=0;
    for (var t in counts) { if(counts[t]>maxC){maxC=counts[t];max=t;} }
    return max;
  }
  function getResult() { return results[getMajorType()]; }
  function showResult() {
    showScreen('screen-loading');
    setTimeout(function(){
      var r = getResult();
      var traitsHtml = '';
      for (var i=0;i<r.traits.length;i++){
        var t = r.traits[i];
        traitsHtml += '<span class="result-trait" style="background:'+t.bg+';color:'+t.color+'">'+t.text+'</span>';
      }
      resultCard.innerHTML =
        '<div class="result-badge" style="background:'+r.badgeColor+'">'+r.badge+'</div>' +
        (r.rarity ? '<div class="result-rarity '+r.rarityCls+'">'+r.rarity+'</div>' : '') +
        (r.rarityDesc ? '<p class="result-rarity-desc">'+r.rarityDesc+'</p>' : '') +
        '<div class="result-emoji '+(r.rarityCls==='rarity-rare'?'rarity-rare-img':r.rarityCls==='rarity-legendary'?'rarity-legendary-img':'')+'"><img loading="lazy" src="'+r.emoji+'" alt="猫咪"></div>' +
        '<h2 class="result-name">'+r.name+'</h2>' +
        '<p class="result-desc">'+r.desc+'</p>' +
        '<div class="result-traits">'+traitsHtml+'</div>' +
        '<p class="result-match">💕 '+r.match+'</p>' +
        '<p class="result-share">快分享给朋友，看看他们是什么猫咪性格吧~ 🐾</p>';
      showScreen('screen-result');
      try {
        var history = JSON.parse(localStorage.getItem('cat_test_history')||'[]');
        history.push({type:r.name,time:Date.now()});
        if(history.length>20) history=history.slice(-20);
        localStorage.setItem('cat_test_history',JSON.stringify(history));
      } catch(e){}
    }, 2000);
  }
  function showWechatShareTip(){
    var overlay=document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9998;display:flex;flex-direction:column;align-items:flex-end;padding:20px;padding-top:40px';
    overlay.innerHTML='<div style="color:#fff;font-size:16px;font-weight:600;margin-bottom:8px">👆 点击右上角「...」</div><div style="color:#fff;font-size:14px;margin-bottom:24px">选择「发送给朋友」或「分享到朋友圈」</div><div style="color:rgba(255,255,255,.6);font-size:13px;margin-top:auto;align-self:center">点击任意位置关闭</div>';
    overlay.addEventListener('click',function(){overlay.remove();});
    document.body.appendChild(overlay);
  }
  function showToast(msg){
    var t=document.createElement('div');
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:999;transition:opacity .3s';
    t.textContent=msg; document.body.appendChild(t);
    setTimeout(function(){t.style.opacity='0';},2000);
    setTimeout(function(){t.remove();},2500);
  }
  btnStart.addEventListener('click',function(){currentQ=0;answers=[];canClick=true;renderQuestion();showScreen('screen-question');});
  btnRetry.addEventListener('click',function(){currentQ=0;answers=[];canClick=true;renderQuestion();showScreen('screen-question');});
  btnShare.addEventListener('click',function(){ showWechatShareTip(); });
  document.addEventListener('touchstart',function(e){if(e.target.closest('.q-option')){var rect=e.target.closest('.q-option').getBoundingClientRect();spawnHeart(e.touches[0].clientX,rect.top);;}},{passive:true});
  window.addEventListener('load',function(){
    var ld=document.getElementById('app-loading');if(ld)ld.remove();
    try{createPaws();}catch(e){
      console.error(e);
      var f=document.createElement('div');
      f.style.cssText='position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;color:#111;font-size:18px;padding:24px;text-align:center;z-index:9999;';
      f.textContent='哎呀，出错了，请刷新试试吧~';
      document.body.innerHTML='';document.body.appendChild(f);
    }
  });
})();
</script>
